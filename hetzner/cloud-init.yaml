#cloud-config
#
# OpenClaw bootstrap for Hetzner VPS
# Paste this into "User data" when creating your server (Ubuntu 22.04).
#
# After boot (~90s), SSH in and run:
#   openclaw onboard --auth-choice openai-codex

write_files:
  - path: /opt/setup-openclaw.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      TOKEN=$(openssl rand -hex 32)
      mkdir -p /opt/openclaw-data /opt/openclaw-workspace

      # Write .env for docker-compose
      cat > /opt/openclaw/.env << EOF
      OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest
      OPENCLAW_CONFIG_DIR=/opt/openclaw-data
      OPENCLAW_WORKSPACE_DIR=/opt/openclaw-workspace
      OPENCLAW_GATEWAY_TOKEN=${TOKEN}
      OPENCLAW_GATEWAY_PORT=18789
      OPENCLAW_GATEWAY_BIND=loopback
      EOF

      # Write minimal config so gateway doesn't refuse to start
      cat > /opt/openclaw-data/openclaw.json << EOF
      {
        "gateway": {
          "mode": "local",
          "bind": "loopback",
          "port": 18789,
          "auth": { "mode": "token", "token": "${TOKEN}" }
        }
      }
      EOF

      # Start OpenClaw
      cd /opt/openclaw && docker compose up -d

      # Save setup info
      cat > /var/log/openclaw-setup.log << INFO
      ========================================
       OpenClaw is running!
      ========================================
       Gateway token: ${TOKEN}

       To configure your AI provider, SSH in and run:
         openclaw onboard --auth-choice openai-codex

       Web UI (SSH tunnel):
         ssh -L 18789:localhost:18789 root@SERVER_IP
         then open: http://localhost:18789
      ========================================
      INFO

      cp /var/log/openclaw-setup.log /etc/motd

      # Install openclaw wrapper so you can run: openclaw <command>
      cat > /usr/local/bin/openclaw << 'WRAPPER'
      #!/usr/bin/env bash
      docker compose -f /opt/openclaw/docker-compose.yml \
        --env-file /opt/openclaw/.env \
        run --rm openclaw-cli "$@"
      WRAPPER
      chmod +x /usr/local/bin/openclaw

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ufw

runcmd:
  # Install Docker CE (official — not docker.io)
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh -q
  - systemctl enable docker
  - systemctl start docker

  # Firewall
  - ufw allow 22
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable

  # Clone OpenClaw repo
  - git clone --depth=1 https://github.com/openclaw/openclaw /opt/openclaw

  # Pre-pull image
  - docker pull ghcr.io/openclaw/openclaw:latest

  # Write .env, start container, save token
  - bash /opt/setup-openclaw.sh
