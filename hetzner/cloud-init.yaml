#cloud-config
#
# OpenClaw bootstrap for Hetzner VPS
# Paste this into "User data" when creating your server (Ubuntu 22.04).
#
# After boot (~90s), SSH in and run:
#   openclaw onboard --auth-choice openai-codex

write_files:
  - path: /opt/setup-openclaw.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      TOKEN=$(openssl rand -hex 32)
      mkdir -p /opt/openclaw-data /opt/openclaw-workspace
      # Fix permissions — container runs as node (UID 1000)
      chown -R 1000:1000 /opt/openclaw-data /opt/openclaw-workspace

      # Write .env for docker-compose
      cat > /opt/openclaw/.env << EOF
      OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest
      OPENCLAW_CONFIG_DIR=/opt/openclaw-data
      OPENCLAW_WORKSPACE_DIR=/opt/openclaw-workspace
      OPENCLAW_GATEWAY_TOKEN=${TOKEN}
      OPENCLAW_GATEWAY_PORT=18789
      OPENCLAW_GATEWAY_BIND=lan
      EOF

      # Write minimal config so gateway starts cleanly
      cat > /opt/openclaw-data/openclaw.json << EOF
      {
        "gateway": {
          "mode": "local",
          "bind": "lan",
          "port": 18789,
          "auth": { "mode": "token", "token": "${TOKEN}" },
          "controlUi": {
            "enabled": true,
            "allowInsecureAuth": true
          }
        }
      }
      EOF

      # Install gog CLI (Google Workspace — Gmail, Calendar, Drive)
      curl -sL https://github.com/steipete/gogcli/releases/download/v0.12.0/gogcli_0.12.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin gog
      chmod +x /usr/local/bin/gog
      mkdir -p /root/.config/gog
      chown -R 1000:1000 /root/.config/gog

      # Write docker-compose.override.yml to mount gog into containers
      cat > /opt/openclaw/docker-compose.override.yml << EOF
      services:
        openclaw-gateway:
          volumes:
            - /usr/local/bin/gog:/usr/local/bin/gog
            - /root/.config/gog:/home/node/.config/gog
        openclaw-cli:
          volumes:
            - /usr/local/bin/gog:/usr/local/bin/gog
            - /root/.config/gog:/home/node/.config/gog
      EOF

      # Start OpenClaw
      cd /opt/openclaw && docker compose -f docker-compose.yml -f docker-compose.override.yml up -d

      # Save setup info
      cat > /var/log/openclaw-setup.log << INFO
      ========================================
       OpenClaw is running!
      ========================================
       Gateway token: ${TOKEN}

       To configure your AI provider, SSH in and run:
         openclaw onboard --auth-choice openai-codex

       Web UI (open this in your browser after SSH tunnel):
         http://localhost:18789?token=${TOKEN}

       SSH tunnel command (run on your local machine):
         ssh -L 18789:localhost:18789 root@$(curl -s ifconfig.me 2>/dev/null || echo YOUR_SERVER_IP)
      ========================================
      INFO

      cp /var/log/openclaw-setup.log /etc/motd

      # Install openclaw wrapper (includes override file if present)
      cat > /usr/local/bin/openclaw << 'WRAPPER'
      #!/usr/bin/env bash
      OVERRIDE_FLAG=""
      if [ -f /opt/openclaw/docker-compose.override.yml ]; then
        OVERRIDE_FLAG="-f /opt/openclaw/docker-compose.override.yml"
      fi
      docker compose -f /opt/openclaw/docker-compose.yml $OVERRIDE_FLAG \
        --env-file /opt/openclaw/.env \
        run --rm openclaw-cli "$@"
      WRAPPER
      chmod +x /usr/local/bin/openclaw

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ufw

runcmd:
  # Install Docker CE (official — not docker.io)
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh -q
  - systemctl enable docker
  - systemctl start docker

  # Firewall
  - ufw allow 22
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable

  # Clone OpenClaw repo
  - git clone --depth=1 https://github.com/openclaw/openclaw /opt/openclaw

  # Pre-pull image
  - docker pull ghcr.io/openclaw/openclaw:latest

  # Write .env, start container, save token
  - bash /opt/setup-openclaw.sh
