#cloud-config
#
# OpenClaw bootstrap for Hetzner VPS
# Paste this into "User data" when creating your server.
#
# After boot (~60s), SSH in and run:
#   cd /opt/openclaw && OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest ./docker-setup.sh

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ufw

runcmd:
  # Install Docker CE (official)
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh -q
  - systemctl enable docker
  - systemctl start docker

  # Firewall — SSH only for now, open more as needed
  - ufw allow 22
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable

  # Pull OpenClaw repo
  - git clone --depth=1 https://github.com/openclaw/openclaw /opt/openclaw

  # Pre-pull the image so the wizard starts faster
  - docker pull ghcr.io/openclaw/openclaw:latest

  # Reminder on login
  - |
    printf '\n\e[1;32mOpenClaw is ready to configure!\e[0m\n\nRun:\n  cd /opt/openclaw\n  OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest ./docker-setup.sh\n\n' > /etc/motd
